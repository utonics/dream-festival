<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT 전문가 멘토링 · Tech Mentor Talk</title>
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#2D7A4F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --zone: #8B6FC0;
  --zone-dark: #7059A8;
  --zone-light: #D8CFEE;
  --zone-pale: #F0ECF8;
  --bg: #F7F6F3;
  --dark: #1A1A1A;
  --white: #FFFFFF;
  --text: #2D2D2D;
  --muted: #8A8A8A;
  --border: #E2E0DA;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,.07);
  --shadow-md: 0 4px 24px rgba(0,0,0,.12);
  --green: #22C55E;
  --green-light: #DCFCE7;
  --red: #EF4444;
  --red-light: #FEE2E2;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', 'Space Grotesk', sans-serif;
  background: var(--bg);
  background-image: radial-gradient(circle, #D0CEC9 1px, transparent 1px);
  background-size: 24px 24px;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── TOP BAR ─── */
#topbar {
  background: var(--zone);
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 16px rgba(139,111,192,.4);
}
#topbar .title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 800;
  font-size: 18px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
}
.back-btn {
  background: rgba(255,255,255,.22);
  border: none;
  color: #fff;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: 'Noto Sans KR', sans-serif;
  transition: background .2s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.back-btn:hover { background: rgba(255,255,255,.38); }
.zone-badge {
  background: rgba(255,255,255,.22);
  color: #fff;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.my-booking-btn {
  background: rgba(255,255,255,.22);
  border: none;
  color: #fff;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: 'Noto Sans KR', sans-serif;
  transition: background .2s;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.my-booking-btn:hover { background: rgba(255,255,255,.38); }

/* ─── SCREENS ─── */
.screen { display: none; }
.screen.active { display: block; }

/* ─── MENTOR LIST SCREEN ─── */
#list-screen {
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 20px 60px;
}
.screen-header {
  text-align: center;
  margin-bottom: 32px;
}
.screen-header .hero-icon {
  font-size: 64px;
  display: block;
  margin-bottom: 12px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.screen-header h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 26px;
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 8px;
}
.screen-header p {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
}

.mentor-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 520px) { .mentor-grid { grid-template-columns: 1fr; } }

.mentor-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform .2s, box-shadow .2s, border-color .2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 12px;
}
.mentor-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
  border-color: var(--zone-light);
}
.mentor-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--zone-pale);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
  border: 3px solid var(--zone-light);
}
.mentor-card-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
}
.mentor-card-role {
  font-size: 13px;
  color: var(--zone);
  font-weight: 600;
}
.company-badge {
  background: var(--zone-pale);
  color: var(--zone-dark);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  border: 1px solid var(--zone-light);
}
.mentor-card-quote {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
  font-style: italic;
}
.career-chip {
  background: #F3F4F6;
  color: #6B7280;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
}

/* ─── MENTOR DETAIL SCREEN ─── */
#detail-screen {
  max-width: 640px;
  margin: 0 auto;
  padding: 32px 20px 60px;
}
.detail-back {
  background: none;
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 7px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: 'Noto Sans KR', sans-serif;
  margin-bottom: 24px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background .2s;
}
.detail-back:hover { background: var(--bg); }

.mentor-profile-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
  margin-bottom: 24px;
  display: flex;
  gap: 20px;
  align-items: flex-start;
}
@media (max-width: 480px) { .mentor-profile-card { flex-direction: column; align-items: center; text-align: center; } }
.profile-avatar-lg {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  background: var(--zone-pale);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 52px;
  border: 3px solid var(--zone-light);
  flex-shrink: 0;
}
.profile-info { flex: 1; }
.profile-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 4px;
}
.profile-role {
  font-size: 14px;
  color: var(--zone);
  font-weight: 600;
  margin-bottom: 8px;
}
.profile-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.profile-quote {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
  font-style: italic;
  border-left: 3px solid var(--zone-light);
  padding-left: 12px;
}
.tags-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.tag {
  background: var(--zone-pale);
  color: var(--zone-dark);
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  border: 1px solid var(--zone-light);
}

.section-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.section-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ─── TIME SLOTS ─── */
.slots-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 8px;
}
.slot-btn {
  padding: 8px 4px;
  border-radius: 8px;
  border: 1.5px solid;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  font-family: 'Space Grotesk', sans-serif;
  text-align: center;
}
.slot-available {
  background: var(--green-light);
  border-color: #86EFAC;
  color: #15803D;
}
.slot-available:hover {
  background: #BBF7D0;
  transform: translateY(-1px);
}
.slot-booked {
  background: #F3F4F6;
  border-color: #D1D5DB;
  color: #9CA3AF;
  cursor: not-allowed;
}
.slot-mine {
  background: var(--zone-pale);
  border-color: var(--zone-light);
  color: var(--zone-dark);
}
.slot-selected {
  background: var(--zone);
  border-color: var(--zone-dark);
  color: #fff;
  transform: scale(1.05);
}
.slot-legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 12px;
  font-size: 11px;
  color: var(--muted);
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 3px;
  display: inline-block;
  margin-right: 4px;
}

.reserve-btn {
  width: 100%;
  background: var(--zone);
  color: #fff;
  border: none;
  padding: 14px;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: background .2s, transform .1s;
  margin-top: 16px;
}
.reserve-btn:hover { background: var(--zone-dark); transform: translateY(-1px); }
.reserve-btn:disabled { background: #D1D5DB; cursor: not-allowed; transform: none; }

/* ─── BOOKING FORM SCREEN ─── */
#form-screen {
  max-width: 560px;
  margin: 0 auto;
  padding: 32px 20px 60px;
}
.form-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
}
.form-header {
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.form-mentor-summary {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.form-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--zone-pale);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  border: 2px solid var(--zone-light);
}
.form-mentor-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--dark);
}
.form-slot-info {
  font-size: 13px;
  color: var(--zone);
  font-weight: 600;
}
.form-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--dark);
}

.form-group {
  margin-bottom: 18px;
}
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 6px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--text);
  background: var(--white);
  transition: border-color .2s;
  outline: none;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--zone);
  box-shadow: 0 0 0 3px rgba(139,111,192,.12);
}
.form-group textarea { resize: vertical; min-height: 100px; }

.interest-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.interest-tag {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--muted);
  background: var(--white);
}
.interest-tag.selected {
  background: var(--zone);
  border-color: var(--zone);
  color: #fff;
}
.interest-tag:hover:not(.selected) {
  border-color: var(--zone-light);
  color: var(--zone);
  background: var(--zone-pale);
}

.submit-btn {
  width: 100%;
  background: var(--zone);
  color: #fff;
  border: none;
  padding: 14px;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: background .2s;
  margin-top: 8px;
}
.submit-btn:hover { background: var(--zone-dark); }

/* ─── CONFIRMATION SCREEN ─── */
#confirm-screen {
  max-width: 560px;
  margin: 0 auto;
  padding: 32px 20px 60px;
}
.confirm-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
  text-align: center;
  margin-bottom: 20px;
}
.confirm-icon {
  font-size: 56px;
  margin-bottom: 12px;
  animation: popIn .4s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.confirm-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 8px;
}
.confirm-subtitle {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 24px;
}
.confirm-details {
  background: var(--zone-pale);
  border-radius: 10px;
  padding: 16px;
  text-align: left;
  margin-bottom: 20px;
}
.confirm-detail-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 4px 0;
  border-bottom: 1px solid var(--zone-light);
}
.confirm-detail-row:last-child { border-bottom: none; }
.confirm-detail-label { color: var(--muted); font-weight: 600; }
.confirm-detail-value { color: var(--dark); font-weight: 700; text-align: right; max-width: 60%; }

#certificate-canvas {
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 16px;
  max-width: 100%;
}
.download-btn {
  width: 100%;
  background: var(--zone);
  color: #fff;
  border: none;
  padding: 13px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: background .2s;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.download-btn:hover { background: var(--zone-dark); }
.back-list-btn {
  width: 100%;
  background: none;
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 13px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: background .2s;
}
.back-list-btn:hover { background: var(--bg); }

.stamp-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--dark);
  color: #fff;
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  z-index: 999;
  transition: transform .4s cubic-bezier(.175,.885,.32,1.275);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
.stamp-toast.show { transform: translateX(-50%) translateY(0); }

/* ─── MY BOOKINGS SCREEN ─── */
#mybookings-screen {
  max-width: 640px;
  margin: 0 auto;
  padding: 32px 20px 60px;
}
.bookings-list { display: flex; flex-direction: column; gap: 14px; }
.booking-item {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 16px;
}
.booking-avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--zone-pale);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  border: 2px solid var(--zone-light);
  flex-shrink: 0;
}
.booking-info { flex: 1; }
.booking-mentor-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--dark);
}
.booking-slot {
  font-size: 13px;
  color: var(--zone);
  font-weight: 600;
  margin: 2px 0;
}
.booking-student { font-size: 12px; color: var(--muted); }
.booking-actions { display: flex; gap: 8px; flex-shrink: 0; }
.cancel-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1.5px solid var(--red);
  background: var(--red-light);
  color: var(--red);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all .15s;
}
.cancel-btn:hover { background: #FECACA; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 500;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.modal-box {
  background: var(--white);
  border-radius: 16px;
  padding: 28px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
  transform: scale(.95);
  transition: transform .2s;
}
.modal-overlay.open .modal-box { transform: scale(1); }
.modal-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px;
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 8px;
}
.modal-body { font-size: 14px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
.modal-actions { display: flex; gap: 10px; }
.modal-confirm {
  flex: 1;
  background: var(--red);
  color: #fff;
  border: none;
  padding: 11px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
.modal-cancel {
  flex: 1;
  background: none;
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 11px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <button class="back-btn" onclick="goHome()">← 대시보드</button>
  <div class="title">👨‍💻 IT 전문가 멘토링</div>
  <div class="topbar-right">
    <button class="my-booking-btn" onclick="showMyBookings()">📋 내 예약</button>
    <span class="zone-badge">E존</span>
  </div>
</div>

<!-- SCREEN 1: MENTOR LIST -->
<div id="list-screen" class="screen active">
  <div class="screen-header">
    <span class="hero-icon">🚀</span>
    <h1>현직 IT 전문가와 1:1 멘토링</h1>
    <p>AI부터 보안까지, 내 진로를 함께 고민해줄 멘토를 선택하세요.<br>멘토당 30분 · 선착순 예약</p>
  </div>
  <div class="mentor-grid" id="mentor-grid"></div>
</div>

<!-- SCREEN 2: MENTOR DETAIL -->
<div id="detail-screen" class="screen">
  <button class="detail-back" onclick="showScreen('list-screen')">← 멘토 목록</button>
  <div class="mentor-profile-card" id="detail-profile"></div>
  <div class="section-card">
    <div class="section-title">🗓️ 시간 선택 <span style="font-size:12px;color:var(--muted);font-weight:400;margin-left:6px;">30분 단위</span></div>
    <div class="slots-grid" id="slots-grid"></div>
    <div class="slot-legend">
      <span><span class="legend-dot" style="background:#DCFCE7;border:1px solid #86EFAC;"></span>예약 가능</span>
      <span><span class="legend-dot" style="background:#F3F4F6;border:1px solid #D1D5DB;"></span>예약 완료</span>
      <span><span class="legend-dot" style="background:var(--zone-pale);border:1px solid var(--zone-light);"></span>내 예약</span>
    </div>
  </div>
  <button class="reserve-btn" id="reserve-btn" disabled onclick="goToForm()">시간을 선택해 주세요</button>
</div>

<!-- SCREEN 3: BOOKING FORM -->
<div id="form-screen" class="screen">
  <button class="detail-back" onclick="showScreen('detail-screen')">← 시간 선택으로</button>
  <div class="form-card">
    <div class="form-header">
      <div class="form-mentor-summary" id="form-mentor-summary"></div>
      <div class="form-title">예약 정보 입력</div>
    </div>
    <div class="form-group">
      <label>이름 *</label>
      <input type="text" id="input-name" placeholder="홍길동" maxlength="20">
    </div>
    <div class="form-group">
      <label>학교 *</label>
      <input type="text" id="input-school" placeholder="○○중학교 / ○○고등학교" maxlength="30">
    </div>
    <div class="form-group">
      <label>학년 *</label>
      <select id="input-grade">
        <option value="">-- 학년 선택 --</option>
        <option>중학교 1학년</option>
        <option>중학교 2학년</option>
        <option>중학교 3학년</option>
        <option>고등학교 1학년</option>
        <option>고등학교 2학년</option>
        <option>고등학교 3학년</option>
      </select>
    </div>
    <div class="form-group">
      <label>관심 분야 (복수 선택 가능)</label>
      <div class="interest-tags" id="interest-tags"></div>
    </div>
    <div class="form-group">
      <label>멘토에게 질문 사항 *</label>
      <textarea id="input-question" placeholder="멘토에게 궁금한 점이나 고민을 자유롭게 적어주세요. (최소 20자)" maxlength="500"></textarea>
    </div>
    <button class="submit-btn" onclick="submitBooking()">예약 확정하기 ✓</button>
  </div>
</div>

<!-- SCREEN 4: CONFIRMATION -->
<div id="confirm-screen" class="screen">
  <div class="confirm-card">
    <div class="confirm-icon">🎉</div>
    <div class="confirm-title">예약이 완료되었어요!</div>
    <div class="confirm-subtitle">아래 확인서를 저장해두세요 📄</div>
    <div class="confirm-details" id="confirm-details"></div>
    <canvas id="certificate-canvas" width="480" height="300"></canvas>
    <button class="download-btn" onclick="downloadCert()">⬇️ 예약 확인서 PNG 다운로드</button>
    <button class="back-list-btn" onclick="showScreen('list-screen')">다른 멘토 보기</button>
  </div>
</div>

<!-- SCREEN 5: MY BOOKINGS -->
<div id="mybookings-screen" class="screen">
  <button class="detail-back" onclick="showScreen('list-screen')">← 멘토 목록</button>
  <div class="section-title" style="font-family:'Space Grotesk';font-size:18px;font-weight:800;color:var(--dark);margin-bottom:20px;">📋 내 예약 목록</div>
  <div class="bookings-list" id="bookings-list"></div>
</div>

<!-- CANCEL MODAL -->
<div class="modal-overlay" id="cancel-modal">
  <div class="modal-box">
    <div class="modal-title">예약을 취소할까요?</div>
    <div class="modal-body" id="cancel-modal-body"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">닫기</button>
      <button class="modal-confirm" onclick="confirmCancel()">취소 확인</button>
    </div>
  </div>
</div>

<!-- STAMP TOAST -->
<div class="stamp-toast" id="stamp-toast">⭐ 스탬프 획득! 프로그램 15 완료</div>

<script>
// ─── DATA ───
const MENTORS = [
  {
    id: 1,
    name: '김태현',
    role: 'AI 엔지니어',
    company: '유토닉스',
    career: '경력 8년',
    emoji: '🤖',
    quote: 'AI가 세상을 바꾸는 방법을 함께 이야기해요',
    tags: ['머신러닝', '딥러닝', 'Python', 'LLM', 'MLOps'],
    color: '#8B6FC0'
  },
  {
    id: 2,
    name: '이수진',
    role: '풀스택 개발자',
    company: '네이버',
    career: '경력 6년',
    emoji: '💻',
    quote: '코딩은 논리적 사고의 시작입니다',
    tags: ['React', 'Node.js', 'TypeScript', '시스템 설계', 'API'],
    color: '#03C75A'
  },
  {
    id: 3,
    name: '박지우',
    role: 'UX 디자이너',
    company: '카카오',
    career: '경력 5년',
    emoji: '🎨',
    quote: '사용자 중심 디자인의 세계로 초대합니다',
    tags: ['Figma', 'UX리서치', '프로토타입', '서비스기획', 'UI'],
    color: '#FFCD00'
  },
  {
    id: 4,
    name: '최민준',
    role: '데이터 분석가',
    company: '삼성SDS',
    career: '경력 7년',
    emoji: '📊',
    quote: '데이터 속에서 인사이트를 발견해보세요',
    tags: ['SQL', 'Python', '데이터시각화', '통계', 'BI'],
    color: '#1428A0'
  },
  {
    id: 5,
    name: '정하은',
    role: '보안 전문가',
    company: 'SK쉴더스',
    career: '경력 9년',
    emoji: '🛡️',
    quote: '디지털 세상을 안전하게 지키는 일',
    tags: ['사이버보안', '침투테스트', '암호화', '네트워크보안', 'CISSP'],
    color: '#E8372B'
  }
];

const INTEREST_OPTIONS = ['AI/머신러닝', '웹 개발', '앱 개발', '데이터 분석', 'UX/UI 디자인', '사이버보안', '클라우드', '게임 개발', '임베디드/IoT'];

const TIME_SLOTS = [];
for (let h = 9; h <= 17; h++) {
  TIME_SLOTS.push(`${String(h).padStart(2,'0')}:00`);
  if (h < 17) TIME_SLOTS.push(`${String(h).padStart(2,'0')}:30`);
}
// 17:30 추가
TIME_SLOTS.push('17:30');

// ─── STATE ───
let currentMentorId = null;
let selectedSlot = null;
let cancelTargetIdx = null;

// ─── STORAGE HELPERS ───
function getBookings() {
  try { return JSON.parse(localStorage.getItem('dreamfest_bookings') || '[]'); } catch { return []; }
}
function saveBookings(arr) {
  localStorage.setItem('dreamfest_bookings', JSON.stringify(arr));
}
function getStamps() {
  try { return JSON.parse(localStorage.getItem('dreamfest_stamps') || '[]'); } catch { return []; }
}
function addStamp() {
  const stamps = getStamps();
  if (!stamps.includes(15)) {
    stamps.push(15);
    localStorage.setItem('dreamfest_stamps', JSON.stringify(stamps));
  }
}
function saveResult(data) {
  try {
    const results = JSON.parse(localStorage.getItem('dreamfest_results') || '{}');
    results[15] = data;
    localStorage.setItem('dreamfest_results', JSON.stringify(results));
  } catch {}
}

// ─── SCREEN MANAGER ───
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ─── MENTOR LIST ───
function renderMentorList() {
  const grid = document.getElementById('mentor-grid');
  grid.innerHTML = MENTORS.map(m => `
    <div class="mentor-card" onclick="showMentorDetail(${m.id})" role="button" tabindex="0" onkeydown="if(event.key==='Enter')showMentorDetail(${m.id})">
      <div class="mentor-avatar">${m.emoji}</div>
      <div class="mentor-card-name">${m.name}</div>
      <div class="mentor-card-role">${m.role}</div>
      <span class="company-badge">${m.company}</span>
      <span class="career-chip">${m.career}</span>
      <div class="mentor-card-quote">"${m.quote}"</div>
    </div>
  `).join('');
}

// ─── MENTOR DETAIL ───
function showMentorDetail(id) {
  currentMentorId = id;
  selectedSlot = null;
  const m = MENTORS.find(x => x.id === id);

  // Profile
  document.getElementById('detail-profile').innerHTML = `
    <div class="profile-avatar-lg">${m.emoji}</div>
    <div class="profile-info">
      <div class="profile-name">${m.name}</div>
      <div class="profile-role">${m.role}</div>
      <div class="profile-meta">
        <span class="company-badge">${m.company}</span>
        <span class="career-chip">${m.career}</span>
      </div>
      <div class="profile-quote">"${m.quote}"</div>
      <div class="tags-row">${m.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>
  `;

  renderSlots(m);
  updateReserveBtn();
  showScreen('detail-screen');
}

function renderSlots(mentor) {
  const bookings = getBookings();
  const grid = document.getElementById('slots-grid');
  grid.innerHTML = TIME_SLOTS.map(slot => {
    const booking = bookings.find(b => b.mentorId === mentor.id && b.slotTime === slot);
    let cls, label, clickable = false;
    if (!booking) {
      cls = 'slot-available'; label = slot; clickable = true;
    } else if (booking.isOwn !== false) {
      // naive: any booking for this slot is treated as "mine" if studentName matches stored
      cls = 'slot-mine'; label = slot + '\n👤내예약';
    } else {
      cls = 'slot-booked'; label = slot + '\n예약완료';
    }
    const selected = selectedSlot === slot ? 'slot-selected' : '';
    return `<button class="slot-btn ${cls} ${selected}"
      ${!clickable ? 'disabled' : ''}
      onclick="${clickable ? `selectSlot('${slot}')` : ''}"
      aria-label="${slot} ${cls === 'slot-available' ? '예약 가능' : '예약 불가'}"
    >${slot}</button>`;
  }).join('');
}

function selectSlot(slot) {
  selectedSlot = slot;
  const m = MENTORS.find(x => x.id === currentMentorId);
  renderSlots(m);
  updateReserveBtn();
}

function updateReserveBtn() {
  const btn = document.getElementById('reserve-btn');
  if (selectedSlot) {
    btn.disabled = false;
    btn.textContent = `${selectedSlot} 예약하기 →`;
  } else {
    btn.disabled = true;
    btn.textContent = '시간을 선택해 주세요';
  }
}

// ─── FORM ───
function goToForm() {
  if (!selectedSlot) return;
  const m = MENTORS.find(x => x.id === currentMentorId);

  // Mentor summary in form
  document.getElementById('form-mentor-summary').innerHTML = `
    <div class="form-avatar">${m.emoji}</div>
    <div>
      <div class="form-mentor-name">${m.name} 멘토 · ${m.role}</div>
      <div class="form-slot-info">⏰ ${selectedSlot} (30분)</div>
    </div>
  `;

  // Interest tags
  const tagsEl = document.getElementById('interest-tags');
  tagsEl.innerHTML = INTEREST_OPTIONS.map(opt => `
    <span class="interest-tag" onclick="toggleInterest(this)" data-val="${opt}">${opt}</span>
  `).join('');

  // Clear fields
  document.getElementById('input-name').value = '';
  document.getElementById('input-school').value = '';
  document.getElementById('input-grade').value = '';
  document.getElementById('input-question').value = '';

  showScreen('form-screen');
}

function toggleInterest(el) {
  el.classList.toggle('selected');
}

function getSelectedInterests() {
  return Array.from(document.querySelectorAll('.interest-tag.selected')).map(e => e.dataset.val);
}

function submitBooking() {
  const name = document.getElementById('input-name').value.trim();
  const school = document.getElementById('input-school').value.trim();
  const grade = document.getElementById('input-grade').value;
  const question = document.getElementById('input-question').value.trim();
  const interests = getSelectedInterests();

  if (!name) { alert('이름을 입력해 주세요.'); return; }
  if (!school) { alert('학교를 입력해 주세요.'); return; }
  if (!grade) { alert('학년을 선택해 주세요.'); return; }
  if (question.length < 20) { alert('질문 사항을 20자 이상 입력해 주세요.'); return; }

  const booking = {
    mentorId: currentMentorId,
    slotTime: selectedSlot,
    studentName: name,
    school,
    grade,
    interests,
    question,
    createdAt: new Date().toISOString()
  };

  const bookings = getBookings();
  bookings.push(booking);
  saveBookings(bookings);
  addStamp();
  saveResult({ mentorId: currentMentorId, slotTime: selectedSlot, studentName: name, completedAt: booking.createdAt });

  showConfirmation(booking);
}

// ─── CONFIRMATION ───
function showConfirmation(booking) {
  const m = MENTORS.find(x => x.id === booking.mentorId);

  // Details
  document.getElementById('confirm-details').innerHTML = `
    <div class="confirm-detail-row">
      <span class="confirm-detail-label">멘토</span>
      <span class="confirm-detail-value">${m.emoji} ${m.name} (${m.role})</span>
    </div>
    <div class="confirm-detail-row">
      <span class="confirm-detail-label">회사</span>
      <span class="confirm-detail-value">${m.company}</span>
    </div>
    <div class="confirm-detail-row">
      <span class="confirm-detail-label">예약 시간</span>
      <span class="confirm-detail-value">${booking.slotTime} (30분)</span>
    </div>
    <div class="confirm-detail-row">
      <span class="confirm-detail-label">예약자</span>
      <span class="confirm-detail-value">${booking.studentName}</span>
    </div>
    <div class="confirm-detail-row">
      <span class="confirm-detail-label">소속</span>
      <span class="confirm-detail-value">${booking.school} ${booking.grade}</span>
    </div>
    ${booking.interests.length ? `<div class="confirm-detail-row">
      <span class="confirm-detail-label">관심 분야</span>
      <span class="confirm-detail-value">${booking.interests.join(', ')}</span>
    </div>` : ''}
  `;

  showScreen('confirm-screen');
  drawCertificate(booking, m);
  showStampToast();
}

function drawCertificate(booking, mentor) {
  const canvas = document.getElementById('certificate-canvas');
  const ctx = canvas.getContext('2d');
  const W = 480, H = 300;
  canvas.width = W;
  canvas.height = H;

  // Background
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, W, H);

  // Border
  ctx.strokeStyle = '#8B6FC0';
  ctx.lineWidth = 3;
  ctx.strokeRect(8, 8, W - 16, H - 16);

  // Inner border
  ctx.strokeStyle = '#D8CFEE';
  ctx.lineWidth = 1;
  ctx.strokeRect(14, 14, W - 28, H - 28);

  // Header band
  ctx.fillStyle = '#8B6FC0';
  ctx.fillRect(8, 8, W - 16, 52);

  // Header text
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 18px "Space Grotesk", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('IT 전문가 멘토링 예약 확인서', W / 2, 41);

  // Sub header
  ctx.fillStyle = '#5A3E8A';
  ctx.font = '13px "Noto Sans KR", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('DreamFest 2025 · E존 미래기술 진로상담', 24, 84);

  // Divider
  ctx.strokeStyle = '#E2E0DA';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(24, 92);
  ctx.lineTo(W - 24, 92);
  ctx.stroke();

  // Mentor info
  ctx.fillStyle = '#1A1A1A';
  ctx.font = 'bold 16px "Space Grotesk", sans-serif';
  ctx.fillText(`${mentor.emoji}  ${mentor.name}`, 28, 118);
  ctx.fillStyle = '#8B6FC0';
  ctx.font = '13px "Noto Sans KR", sans-serif';
  ctx.fillText(`${mentor.role} · ${mentor.company} · ${mentor.career}`, 28, 138);

  // Time
  ctx.fillStyle = '#1A1A1A';
  ctx.font = 'bold 22px "Space Grotesk", sans-serif';
  ctx.fillText(booking.slotTime, 28, 172);
  ctx.fillStyle = '#8A8A8A';
  ctx.font = '12px "Noto Sans KR", sans-serif';
  ctx.fillText('(30분 세션)', 28, 190);

  // Student info
  ctx.fillStyle = '#2D2D2D';
  ctx.font = 'bold 14px "Space Grotesk", sans-serif';
  ctx.fillText(booking.studentName, 28, 222);
  ctx.fillStyle = '#8A8A8A';
  ctx.font = '12px "Noto Sans KR", sans-serif';
  ctx.fillText(`${booking.school} · ${booking.grade}`, 28, 240);

  // QR placeholder
  const qrX = W - 100, qrY = 100;
  ctx.strokeStyle = '#D8CFEE';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(qrX, qrY, 72, 72);
  ctx.fillStyle = '#F0ECF8';
  ctx.fillRect(qrX, qrY, 72, 72);
  ctx.fillStyle = '#8B6FC0';
  ctx.font = 'bold 11px "Space Grotesk", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('QR CODE', qrX + 36, qrY + 34);
  ctx.font = '9px sans-serif';
  ctx.fillStyle = '#C4B5E0';
  ctx.fillText('예약 확인', qrX + 36, qrY + 50);
  ctx.textAlign = 'left';

  // Footer
  ctx.fillStyle = '#C4B5E0';
  ctx.font = '10px "Space Grotesk", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`발급일: ${new Date().toLocaleDateString('ko-KR')}  ·  프로그램 No.15`, W / 2, H - 18);
}

function downloadCert() {
  const canvas = document.getElementById('certificate-canvas');
  const link = document.createElement('a');
  link.download = `멘토링예약확인서_${new Date().toISOString().slice(0,10)}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ─── MY BOOKINGS ───
function showMyBookings() {
  const bookings = getBookings();
  const list = document.getElementById('bookings-list');
  if (bookings.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <p>아직 예약한 멘토링이 없어요.<br>멘토를 선택하고 예약해보세요!</p>
      </div>`;
  } else {
    list.innerHTML = bookings.map((b, i) => {
      const m = MENTORS.find(x => x.id === b.mentorId);
      return `
        <div class="booking-item">
          <div class="booking-avatar">${m ? m.emoji : '👤'}</div>
          <div class="booking-info">
            <div class="booking-mentor-name">${m ? m.name : '알 수 없음'} 멘토</div>
            <div class="booking-slot">⏰ ${b.slotTime} · ${m ? m.role : ''}</div>
            <div class="booking-student">${b.studentName} · ${b.school} ${b.grade}</div>
          </div>
          <div class="booking-actions">
            <button class="cancel-btn" onclick="openCancelModal(${i})">취소</button>
          </div>
        </div>`;
    }).join('');
  }
  showScreen('mybookings-screen');
}

function openCancelModal(idx) {
  cancelTargetIdx = idx;
  const bookings = getBookings();
  const b = bookings[idx];
  const m = MENTORS.find(x => x.id === b.mentorId);
  document.getElementById('cancel-modal-body').textContent =
    `${m ? m.name : ''} 멘토 · ${b.slotTime} 예약을 취소하면 되돌릴 수 없습니다.`;
  document.getElementById('cancel-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('cancel-modal').classList.remove('open');
  cancelTargetIdx = null;
}
function confirmCancel() {
  if (cancelTargetIdx === null) return;
  const bookings = getBookings();
  bookings.splice(cancelTargetIdx, 1);
  saveBookings(bookings);
  closeModal();
  showMyBookings();
}

// ─── STAMP TOAST ───
function showStampToast() {
  const toast = document.getElementById('stamp-toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ─── NAVIGATION ───
function goHome() {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'navigate', target: 'dashboard' }, '*');
  } else {
    const idx = '../index.html';
    window.location.href = idx;
  }
}

// ─── INIT ───
renderMentorList();
</script>
<script src="../sync-client.js"></script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("../sw.js").catch(function(){})}</script>
