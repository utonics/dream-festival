<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D7A4F"/>
      <stop offset="100%" style="stop-color:#1B5E3A"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F"/>
      <stop offset="100%" style="stop-color:#FFA726"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Grid dots pattern -->
  <g opacity="0.08" fill="white">
    <circle cx="80" cy="80" r="3"/><circle cx="140" cy="80" r="3"/><circle cx="200" cy="80" r="3"/><circle cx="260" cy="80" r="3"/><circle cx="320" cy="80" r="3"/><circle cx="380" cy="80" r="3"/><circle cx="440" cy="80" r="3"/>
    <circle cx="80" cy="140" r="3"/><circle cx="140" cy="140" r="3"/><circle cx="200" cy="140" r="3"/><circle cx="260" cy="140" r="3"/><circle cx="320" cy="140" r="3"/><circle cx="380" cy="140" r="3"/><circle cx="440" cy="140" r="3"/>
    <circle cx="80" cy="200" r="3"/><circle cx="140" cy="200" r="3"/><circle cx="200" cy="200" r="3"/><circle cx="260" cy="200" r="3"/><circle cx="320" cy="200" r="3"/><circle cx="380" cy="200" r="3"/><circle cx="440" cy="200" r="3"/>
    <circle cx="80" cy="380" r="3"/><circle cx="140" cy="380" r="3"/><circle cx="200" cy="380" r="3"/><circle cx="260" cy="380" r="3"/><circle cx="320" cy="380" r="3"/><circle cx="380" cy="380" r="3"/><circle cx="440" cy="380" r="3"/>
    <circle cx="80" cy="440" r="3"/><circle cx="140" cy="440" r="3"/><circle cx="200" cy="440" r="3"/><circle cx="260" cy="440" r="3"/><circle cx="320" cy="440" r="3"/><circle cx="380" cy="440" r="3"/><circle cx="440" cy="440" r="3"/>
  </g>
  <!-- Star/Dream symbol -->
  <g transform="translate(256,185)">
    <polygon points="0,-65 18,-22 65,-22 28,8 40,52 0,28 -40,52 -28,8 -65,-22 -18,-22" fill="url(#star)" opacity="0.95"/>
  </g>
  <!-- Circuit/AI lines -->
  <g stroke="rgba(255,255,255,0.25)" stroke-width="2" fill="none">
    <path d="M130,290 L200,290 L220,310 L300,310 L320,290 L390,290"/>
    <path d="M150,330 L210,330 L230,350 L290,350 L310,330 L370,330"/>
    <circle cx="130" cy="290" r="4" fill="rgba(255,255,255,0.4)"/>
    <circle cx="390" cy="290" r="4" fill="rgba(255,255,255,0.4)"/>
    <circle cx="150" cy="330" r="4" fill="rgba(255,255,255,0.4)"/>
    <circle cx="370" cy="330" r="4" fill="rgba(255,255,255,0.4)"/>
  </g>
  <!-- Text: 꿈 -->
  <text x="256" y="420" font-family="sans-serif" font-weight="900" font-size="72" text-anchor="middle" fill="white" opacity="0.95">꿈-Dream</text>
  <!-- Zone color dots -->
  <g transform="translate(256,455)">
    <circle cx="-80" cy="0" r="8" fill="#E8705A"/>
    <circle cx="-40" cy="0" r="8" fill="#D4943A"/>
    <circle cx="0" cy="0" r="8" fill="#2BA5B3"/>
    <circle cx="40" cy="0" r="8" fill="#6BAF3A"/>
    <circle cx="80" cy="0" r="8" fill="#8B6FC0"/>
  </g>
</svg>
